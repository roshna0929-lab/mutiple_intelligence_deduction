<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiple Intelligence Assessment</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

.page{
display:none;
width:100vw;
height:100vh;
padding:30px;
box-sizing:border-box;
}

.active{
display:block;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:8px;
width:250px;
}

.topIcons{
position:absolute;
top:15px;
right:20px;
}

.icon{
font-size:24px;
cursor:pointer;
margin-left:15px;
}

.back{
position:absolute;
top:15px;
left:20px;
font-size:22px;
cursor:pointer;
}

.hidden{
display:none;
}

.miGrid{
display:grid;
grid-template-columns:repeat(2,200px);
gap:15px;
justify-content:center;
}

canvas{
max-width:500px;
}

</style>
</head>

<body>

<!-- BACK BUTTON -->
<div class="back" onclick="goBack()">⬅</div>

<!-- ICONS -->
<div class="topIcons">
<span class="icon" onclick="toggleVoice()">🔊</span>
<span class="icon" onclick="toggleSettings()">⚙</span>
<span class="icon" onclick="openAdmin()">👨‍💼</span>
</div>


<!-- LOGIN PAGE -->
<div id="login" class="page active center">

<h2>Multiple Intelligence Assessment</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<button onclick="openPage('signup')">Sign Up</button>

</div>


<!-- SIGNUP PAGE -->
<div id="signup" class="page center">

<h2>Create Account</h2>

<input id="newEmail" placeholder="Email">
<input id="newPass" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

</div>


<!-- CLASS PAGE -->
<div id="classPage" class="page center">

<h2>Select Your Class</h2>

<select id="classSelect">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<button onclick="openPage('miPage')">Done</button>

</div>


<!-- MI PAGE -->
<div id="miPage" class="page center">

<h2>Select Intelligence</h2>

<div class="miGrid">

<button onclick="selectMI('Verbal')">Verbal</button>
<button onclick="selectMI('Logical')">Logical</button>
<button onclick="selectMI('Musical')">Musical</button>
<button onclick="selectMI('Spatial')">Spatial</button>
<button onclick="selectMI('Bodily')">Bodily</button>
<button onclick="selectMI('Interpersonal')">Interpersonal</button>
<button onclick="selectMI('Intrapersonal')">Intrapersonal</button>
<button onclick="selectMI('Naturalistic')">Naturalistic</button>

</div>

</div>


<!-- DIFFICULTY -->
<div id="difficulty" class="page center">

<h2>Select Difficulty</h2>

<button onclick="startTest()">Low</button>
<button onclick="startTest()">Medium</button>
<button onclick="startTest()">High</button>

</div>


<!-- QUESTION PAGE -->
<div id="questionPage" class="page center">

<h2 id="question"></h2>

<button onclick="answer()">Option 1</button>
<button onclick="answer()">Option 2</button>
<button onclick="answer()">Option 3</button>

<button onclick="saveQuery()">❓ I don't know</button>

</div>


<!-- FINISH PAGE -->
<div id="finishPage" class="page center">

<h1>🎆 Assessment Completed 🎆</h1>

</div>


<!-- VOICE PANEL -->
<div id="voicePanel" class="page hidden center">

<h2>Voice Settings</h2>

Female / Male Voice

<br><br>

Speed

<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<button onclick="closePanels()">Done</button>

</div>


<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="page hidden center">

<h2>Appearance Settings</h2>

Dark / Light Mode

<button onclick="toggleMode()">Toggle Mode</button>

<br>

Button Color

<input type="color" onchange="changeColor(this.value)">

<button onclick="closePanels()">Done</button>

</div>


<!-- ADMIN LOGIN -->
<div id="adminLogin" class="page center">

<h2>Admin Login</h2>

<input id="adminPass">

<button onclick="adminLogin()">Login</button>

</div>


<!-- ADMIN DASHBOARD -->
<div id="adminPage" class="page">

<h2>Student Progress</h2>

<div id="studentList"></div>

<canvas id="radarChart"></canvas>

</div>


<script>

let history=[]
let currentUser=""
let questionIndex=0

let questions=[
"What word completes the sentence?",
"What comes next in the pattern?",
"Identify the correct sound?",
"Which shape matches?",
"What action solves the task?"
]

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

history.push(id)

speak(document.querySelector("#"+id+" h2")?.innerText)

}

function goBack(){

history.pop()

let prev=history.pop()

if(prev)openPage(prev)

}

function signup(){

let email=newEmail.value

let pass=newPass.value

localStorage.setItem(email,JSON.stringify({pass:pass,mi:{}}))

alert("Account created")

openPage("login")

}

function login(){

let data=JSON.parse(localStorage.getItem(email.value))

if(data && data.pass===pass.value){

currentUser=email.value

openPage("classPage")

}else{

alert("Invalid login")

}

}

function selectMI(mi){

openPage("difficulty")

}

function startTest(){

questionIndex=0

nextQuestion()

}

function nextQuestion(){

if(questionIndex>=5){

finishTest()

return

}

question.innerText=questions[questionIndex]

openPage("questionPage")

}

function answer(){

questionIndex++

nextQuestion()

}

function saveQuery(){

alert("Query saved")

}

function finishTest(){

openPage("finishPage")

}

function speak(text){

let u=new SpeechSynthesisUtterance(text)

u.rate=document.getElementById("speed")?.value || 1

speechSynthesis.speak(u)

}

function toggleVoice(){

openPage("voicePanel")

}

function toggleSettings(){

openPage("settingsPanel")

}

function closePanels(){

goBack()

}

function toggleMode(){

document.body.classList.toggle("dark")

}

function changeColor(c){

document.querySelectorAll("button").forEach(b=>b.style.background=c)

}

function openAdmin(){

openPage("adminLogin")

}

function adminLogin(){

if(adminPass.value==="multipleintelligence_8"){

openPage("adminPage")

loadStudents()

}

}

function loadStudents(){

let list=document.getElementById("studentList")

list.innerHTML=""

for(let i=0;i<localStorage.length;i++){

let name=localStorage.key(i)

let btn=document.createElement("button")

btn.innerText=name

btn.onclick=()=>showRadar()

list.appendChild(btn)

}

}

function showRadar(){

new Chart(document.getElementById("radarChart"),{

type:"radar",

data:{
labels:["Verbal","Logical","Musical","Spatial","Bodily","Interpersonal","Intrapersonal","Naturalistic"],

datasets:[{

label:"Intelligence Level",

data:[70,65,80,55,60,75,68,72]

}]

}

})

}

</script>

</body>
</html>
